apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: payment-create
  namespace: nautible-app-ms
spec:
  pubsubname: payment-pubsub
  topic: payment\-create # AWSのSNS/SQSのみ、Topic名にハイフンがある場合はエスケープする
  routes:
    default: /payment/create
scopes:
- nautible-app-ms-payment

---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: payment-reject-create
  namespace: nautible-app-ms
spec:
  pubsubname: payment-pubsub
  topic: payment\-reject\-create # AWSのSNS/SQSのみ、Topic名にハイフンがある場合はエスケープする
  routes:
    default: /payment/rejectCreate
scopes:
- nautible-app-ms-payment
